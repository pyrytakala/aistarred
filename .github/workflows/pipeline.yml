# Disabled on push — rankings are built locally and committed under public/data/.
# Re-enable with `on: push` + GitHub secrets if you want CI to refresh rankings.
name: Pipeline

on:
  workflow_dispatch:

concurrency:
  group: pipeline-main
  cancel-in-progress: true

jobs:
  refresh-rankings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      API_CACHE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore pipeline data cache
        uses: actions/cache@v4
        with:
          path: |
            .cache
            scores
            transcripts
          key: pipeline-data-v2-${{ hashFiles('package-lock.json', 'scoring_prompt.txt', 'scoring_prompt_podcast.txt', 'src/lib/sources-config.ts') }}
          restore-keys: |
            pipeline-data-v2-

      - run: npm ci

      - name: Run rankings pipeline (cache-first, no paid calls when cached)
        run: npm run pipeline -- --reparse-only --all-sources
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          TRANSCRIPTAPI_API_KEY: ${{ secrets.TRANSCRIPTAPI_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}

      - name: Commit published rankings artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No rankings changes to commit."
          else
            git commit -m "Update published rankings [skip ci]"
            git push
          fi
