<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI starred — Find top content, curated by a friendly LLM</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  </head>
  <body class="page-feed">
    <nav class="site-header">
      <div class="site-header-inner">
        <a class="site-logo" href="/" aria-label="AI starred home">
          <img src="/icons/logo-28.png" srcset="/icons/logo-72.png 2x" alt="" width="47" height="47" decoding="async" />
        </a>
        <div class="site-nav">
          <a class="site-nav-link" href="/" aria-current="page">Feed</a>
          <a class="site-nav-link" href="/sources/">Sources</a>
        </div>
      </div>
    </nav>
    <main class="feed">
      <header class="feed-header">
        <p class="feed-lede">Find top content, curated by a friendly LLM</p>
        <div class="list-toolbar">
          <p id="feed-meta" class="feed-meta">Loading…</p>
          <div class="page-filters">
            <div id="sort-filters"></div>
            <div id="content-kind-filters"></div>
            <div id="time-filters"></div>
            <div id="score-filters"></div>
          </div>
        </div>
      </header>
      <div id="feed-list" class="feed-list" aria-live="polite"></div>
    </main>
    <footer class="site-footer">
      <a href="/how-it-works/">How it works</a>
      <a href="/disclaimer/">Disclaimer</a>
    </footer>

    <template id="card-template">
      <article class="card">
        <a class="thumb-link" target="_blank" rel="noopener noreferrer">
          <img class="thumb" alt="" loading="lazy" />
          <span class="card-kind" hidden></span>
          <span class="duration" hidden></span>
        </a>
        <div class="body">
          <div class="card-header">
            <div class="talk-heading">
              <a class="title-link" target="_blank" rel="noopener noreferrer"></a>
              <div class="talk-meta">
                <a class="feed-source-link" hidden></a>
                <time class="published"></time>
                <span class="audience-level-wrap" hidden>
                  <span class="audience-level" tabindex="0"></span>
                </span>
                <div class="card-tags tags" hidden></div>
              </div>
            </div>
            <div class="score-wrap">
              <button type="button" class="score" aria-expanded="false" aria-label="Show score breakdown"></button>
              <div class="score-breakdown" hidden></div>
            </div>
          </div>
          <div class="summary-wrap">
            <ul class="summary"></ul>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="/src/feed.ts"></script>
  </body>
</html>
